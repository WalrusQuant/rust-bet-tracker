<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F3ECDF"/>

  <!-- Top rule -->
  <rect x="60" y="60" width="1080" height="2" fill="#2A2622"/>

  <!-- Wordmark top-left -->
  <text x="60" y="110" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.01em" fill="#2A2622">BET TRACKER.</text>

  <!-- Kicker -->
  <text x="60" y="220" font-family="Inter, sans-serif" font-size="18" font-weight="500" letter-spacing="2.88px" fill="#6B645A">A LOCAL-FIRST DESKTOP APP</text>

  <!-- Headline -->
  <text x="60" y="320" font-family="Space Grotesk, sans-serif" font-size="92" font-weight="700" letter-spacing="-0.02em" fill="#2A2622">TRACK YOUR BETS.</text>
  <text x="60" y="410" font-family="Space Grotesk, sans-serif" font-size="92" font-weight="700" letter-spacing="-0.02em" fill="#2A2622">OWN YOUR DATA.</text>

  <!-- Sub -->
  <text x="60" y="475" font-family="Inter, sans-serif" font-size="26" font-weight="400" fill="#6B645A">21 calculators. Rust core. SQLite on disk.</text>

  <!-- Bottom rule -->
  <rect x="60" y="555" width="1080" height="2" fill="#2A2622"/>

  <!-- Bottom-left URL -->
  <text x="60" y="590" font-family="JetBrains Mono, monospace" font-size="16" font-weight="500" letter-spacing="2.24px" fill="#2A2622">WALRUSQUANT.GITHUB.IO/RUST-BET-TRACKER</text>

  <!-- Bottom-right badges -->
  <g transform="translate(890, 568)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="none" stroke="#2A2622" stroke-width="1.5"/>
    <text x="50" y="19" font-family="Inter, sans-serif" font-size="11" font-weight="500" letter-spacing="1.32px" fill="#2A2622" text-anchor="middle">RUST + TAURI</text>
  </g>
  <g transform="translate(1000, 568)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="none" stroke="#2A2622" stroke-width="1.5"/>
    <text x="40" y="19" font-family="Inter, sans-serif" font-size="11" font-weight="500" letter-spacing="1.32px" fill="#2A2622" text-anchor="middle">SVELTE 5</text>
  </g>

  <!-- Ghost mascot, right side -->
  <g transform="translate(820, 200) scale(2.2)" fill="none" stroke="#2A2622" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 128 Q 80 124, 150 128" stroke-width="1.5"/>
    <path d="M48 40 C 48 22, 64 12, 80 12 C 98 12, 112 24, 112 40 L 112 104 Q 112 118, 100 120 L 60 120 Q 48 118, 48 104 Z" fill="#FDFAF4"/>
    <circle cx="68" cy="50" r="2.4" fill="#2A2622" stroke="none"/>
    <circle cx="92" cy="50" r="2.4" fill="#2A2622" stroke="none"/>
    <path d="M72 62 Q 80 70, 88 62"/>
    <circle cx="60" cy="62" r="2.2" fill="#E8C8B4" stroke="none" opacity="0.55"/>
    <circle cx="100" cy="62" r="2.2" fill="#E8C8B4" stroke="none" opacity="0.55"/>
    <path d="M58 78 L 102 78" stroke-width="1.5"/>
    <path d="M64 120 L 64 128"/>
    <path d="M96 120 L 96 128"/>
    <path d="M120 104 L 140 104 L 140 120 L 120 120 Z" fill="#EAE2D2"/>
    <path d="M130 104 L 130 120" stroke-width="1.2"/>
  </g>

  <!-- Wobbly divider between headline and sub -->
  <path d="M 60 440 C 120 438, 200 442, 280 440 S 440 437, 520 441 S 680 444, 760 440"
        fill="none" stroke="#2A2622" stroke-width="1.25" stroke-linecap="round"/>
